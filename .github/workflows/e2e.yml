name: Playwright E2E

on:
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    uses: avantifellows/plio-frontend/.github/workflows/e2e.yml@661c2d55db9106de0adb191fe39228cbdb23e635
    with:
      trigger_role: backend
      # github.sha is the PR merge commit — test what would actually land
      trigger_ref: ${{ github.sha }}
      branch_name: ${{ github.head_ref }}
    secrets:
      GOOGLE_OAUTH2_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}
      GOOGLE_OAUTH2_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH2_CLIENT_SECRET }}
      GOOGLE_OAUTH2_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH2_REFRESH_TOKEN }}
