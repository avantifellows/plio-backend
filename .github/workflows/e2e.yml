name: Playwright E2E

on:
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    uses: avantifellows/plio-frontend/.github/workflows/e2e.yml@185e7ef1a48a1121692e58c634e0e21ef2a0cd67
    with:
      trigger_role: backend
      trigger_ref: ${{ github.event.pull_request.head.sha }}
      branch_name: ${{ github.head_ref }}
    secrets:
      GOOGLE_OAUTH2_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}
      GOOGLE_OAUTH2_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH2_CLIENT_SECRET }}
      GOOGLE_OAUTH2_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH2_REFRESH_TOKEN }}
