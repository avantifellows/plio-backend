name: Plio CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - uses: pre-commit/action@v2.0.0

  test:
    name: Test ${{ matrix.lane }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lane: [unit, integration]
    services:
      redis:
        image: redis
        ports:
          # Maps port 6379 on service container to the host
          - 6379:6379
        # Set health checks to wait until redis has started
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      # Creates a postgres docker where migrations will run.
      db:
        image: postgres:12.3-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions_testing
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v2

      # Install Python. This matches the Python version in Dockerfile.
      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run unit tests
        if: matrix.lane == 'unit'
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: github_actions_testing
          DB_USER: postgres
          DB_PASSWORD: postgres
          SECRET_KEY: wpurj&oym6m@kcp(m&z(q-g0bo-r*+!f_&j(94di8j&_j4m%2s # random secret key
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
          REDIS_HOSTNAME: 127.0.0.1
          REDIS_PORT: 6379
          DEFAULT_TENANT_SHORTCODE: plio
        run: coverage run -m pytest --ignore=tests/integration

      - name: Run integration tests
        if: matrix.lane == 'integration'
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: github_actions_testing
          DB_USER: postgres
          DB_PASSWORD: postgres
          SECRET_KEY: test-secret-key
          REDIS_HOSTNAME: 127.0.0.1
          REDIS_PORT: 6379
          DEFAULT_TENANT_SHORTCODE: plio
        run: coverage run -m pytest -m integration

      - name: Generate coverage reports
        run: |
          coverage xml
          coverage json -o coverage.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.lane }}
          fail_ci_if_error: true

      - name: Fetch base branch coverage floor
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin ${{ github.base_ref }}
          git show origin/${{ github.base_ref }}:coverage_floors/${{ matrix.lane }} \
            > /tmp/base-floor-${{ matrix.lane }} || true

      - name: Enforce coverage floor
        run: >-
          python scripts/check_coverage_floor.py
          --lane ${{ matrix.lane }}
          --coverage-json coverage.json
          --floor-file coverage_floors/${{ matrix.lane }}
          ${{ github.event_name == 'pull_request' && format('--base-floor-file /tmp/base-floor-{0}', matrix.lane) || '' }}
